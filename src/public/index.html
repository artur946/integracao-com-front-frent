<!DOCTYPE html>
<html lang="pt-BR">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
	<title>Sistema de Agendamento</title>
</head>

<body>

	<header>
		<h1>Sistema de Agendamento</h1>
		<p>Faca login para acessar o sistema.</p>
	</header>

	<nav>
		<a href="/index.html">Inicio</a>
		<a href="/servicos.html">Servicos</a>
		<a href="/agendamentos.html">Agendamentos</a>
	</nav>

	<main>
		<section>
			<h2>Login</h2>

			<form id="form-login">
				<label for="email">E-mail</label>
				<br>
				<input type="email" id="email" name="email" required>

				<br><br>

				<label for="password">Senha</label>
				<br>
				<input type="password" id="password" name="password" required>

				<br><br>

				<button type="submit">Entrar</button>
			</form>

			<p id="mensagem"></p>
		</section>

		<section>
			<h2>Criar conta</h2>

			<form id="form-cadastro">
				<label for="nome-cadastro">Nome</label>
				<br>
				<input type="text" id="nome-cadastro" name="nome" required>

				<br><br>

				<label for="email-cadastro">E-mail</label>
				<br>
				<input type="email" id="email-cadastro" name="email" required>

				<br><br>

				<label for="senha-cadastro">Senha</label>
				<br>
				<input type="password" id="senha-cadastro" name="senha" required>

				<br><br>

				<button type="submit">Cadastrar</button>
			</form>

			<p id="mensagem-cadastro"></p>
		</section>
	</main>

	<script src="/js/login.js"></script>
	<script src="/js/cadastro.js"></script>
</body>

</html>
